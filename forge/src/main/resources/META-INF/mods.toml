modLoader = "javafml"
loaderVersion = "[65,)"
license = "MIT"

[[mods]]
modId = "${modId}"
version = "${minecraftVersion}-${modVersion}"
displayName = "${modName}"
authors = "${modAuthor}"
credits = "${modContributors}"
description = "${modDescription}"
logoFile = "logo.png"
displayURL = "${modUrl}"

[modproperties.${modId}]
incompatibleMods = ["betterthirdperson", "customcameraview", "nimble"]

[[dependencies.${modId}]]
modId = "minecraft"
mandatory = true
versionRange = "[26.2,)"
ordering = "NONE"
side = "CLIENT"

